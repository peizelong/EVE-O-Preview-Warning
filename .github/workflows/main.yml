name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: 8.0.x

      - name: Restore dependencies
        run: dotnet restore EVEAutoWarning.sln

      - name: Build
        run: dotnet build EVEAutoWarning.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish EVEAutoWarning/EVEAutoWarning.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:PublishTrimmed=true --output ./publish

      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: EVEAutoWarning-win-x64
          path: ./publish/
